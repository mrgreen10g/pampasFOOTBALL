<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pampas | Bono de Bienvenida 🎁</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg-dark: #090b10; 
            --neon-green: #00ff88; 
            --neon-yellow: #ffcc00;
            --text-main: #ffffff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden; text-align: center;
        }

        /* Фоновое зацикленное видео */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2;
        }
        /* Затемнение фона для хорошей читаемости текста */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(9, 11, 16, 0.65); z-index: -1;
        }

        .container { width: 100%; max-width: 400px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; flex-grow: 1; min-height: 100vh; }

        .header { margin-top: 20px; width: 100%; }
        h1 { font-size: 24px; font-weight: 800; margin: 0; line-height: 1.3; text-transform: uppercase; letter-spacing: 0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        
        /* Блок с Промокодом */
        .promo-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px; margin: 25px 0; width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .promo-title { font-size: 13px; color: #cbd5e1; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; font-weight: 600; }
        .promo-container { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 8px 8px 8px 15px; border-radius: 8px; border: 1px dashed var(--neon-yellow); }
        
        /* Стили для текста промокода */
        .promo-code { font-size: 20px; font-weight: 900; color: var(--neon-yellow); letter-spacing: 2px; }
        
        .btn-copy { background: var(--neon-yellow); color: #000; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-copy:active { transform: scale(0.95); }

        /* Пульсирующая кнопка */
        .btn-main { 
            background: linear-gradient(135deg, #00ff88, #00b09b);
            color: #000; padding: 20px; border-radius: 12px; text-decoration: none; 
            font-weight: 800; font-size: 20px; display: flex; align-items: center; 
            justify-content: center; gap: 12px; margin-bottom: 20px;
            border: none; width: 100%; cursor: pointer; text-transform: uppercase;
            animation: btnHeartbeat 2s infinite;
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }

        @keyframes btnHeartbeat {
            0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4); }
            50% { transform: scale(1.04); box-shadow: 0 15px 40px rgba(0, 255, 136, 0.7); }
            100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4); }
        }

        /* Уведомление о копировании */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #10b981; color: #fff;
            text-align: center; border-radius: 8px; padding: 12px; position: fixed;
            z-index: 10000; bottom: 30px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Overlay инструкции */
        #guideOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(9, 11, 16, 0.96); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }
        .arrow-top { position: absolute; top: 25px; right: 35px; font-size: 55px; color: var(--neon-green); animation: point 0.8s infinite alternate; }
        @keyframes point { from { transform: translate(0, 0); } to { transform: translate(10px, -10px); } }
        
        .overlay-text { font-size: 19px; line-height: 1.5; color: white; margin-top: 10px; font-weight: 500; }
        .overlay-step { color: var(--neon-green); font-size: 15px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .fake-btn { 
            color: #fff; font-size: 18px; border: 2px solid var(--neon-green); 
            padding: 15px 20px; border-radius: 8px; display: inline-block; 
            margin-top: 20px; font-weight: bold; background: rgba(0, 255, 136, 0.1);
        }
    </style>
</head>
<body>

<video class="video-bg" autoplay loop muted playsinline>
    <source src="background.mp4" type="video/mp4">
</video>
<div class="bg-overlay"></div>

<div class="container">
    <div class="header">
        <h1>¡LOS PAGOS MÁS RÁPIDOS EN LATAM!</h1>
    </div>

    <div class="promo-box">
        <div class="promo-title">Tu código de bono exclusivo:</div>
        <div class="promo-container">
            <span class="promo-code" id="promoText">STREAMCLUB</span>
            
            <button class="btn-copy" onclick="copyPromo()">
                <i class="fas fa-copy"></i> Copiar
            </button>
        </div>
    </div>

    <button class="btn-main" onclick="handleMainClick()">
        <i class="fas fa-gift"></i> RECLAMAR BONO
    </button>
</div>

<div id="guideOverlay">
    <div class="arrow-top"><i class="fas fa-arrow-up"></i></div>
    <div class="overlay-text">
        <div style="font-size: 45px; margin-bottom: 15px; color: #fff;">⋮</div>
        <div class="overlay-step">Paso 1</div>
        <b>Toca los tres puntos en la esquina superior derecha</b><br><br><br>
        <div class="overlay-step">Paso 2</div>
        <b>Selecciona la opción:</b><br>
        <div class="fake-btn">
            <i class="fas fa-compass"></i> Abrir en el navegador
        </div>
    </div>
</div>

<div id="toast"><i class="fas fa-check-circle"></i> ¡Código copiado con éxito!</div>

<script>
    // =========================================================================
    // 2. ССЫЛКА НА КОТОРУЮ ПРИНУДИТЕЛЬНО ПЕРЕКИДЫВАЕМ (МЕНЯТЬ ЗДЕСЬ)
    // =========================================================================
    const targetUrl = "https://bit.ly/pampasTT";
    // =========================================================================

    function isRestrictedBrowser() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        return (ua.indexOf('TikTok') > -1) || (ua.indexOf('musical_ly') > -1) || (ua.indexOf('App-WebView') > -1) || (ua.indexOf('Instagram') > -1);
    }

    // Автоматический мгновенный редирект, если открыто в обычном браузере
    window.onload = function() {
        if (!isRestrictedBrowser()) {
            window.location.replace(targetUrl);
        }
    }

    function handleMainClick() {
        if (isRestrictedBrowser()) {
            document.getElementById('guideOverlay').style.display = 'flex';
        } else {
            window.location.replace(targetUrl);
        }
    }

    // Функция копирования промокода
    function copyPromo() {
        const promo = document.getElementById('promoText').innerText;
        navigator.clipboard.writeText(promo).then(() => {
            showToast();
        }).catch(err => {
            // Фолбэк для старых устройств
            let input = document.createElement('input');
            input.setAttribute('value', promo);
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast();
        });
    }

    function showToast() {
        var x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2500);
    }
</script>

</body>
</html>
